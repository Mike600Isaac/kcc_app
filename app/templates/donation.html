<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Donation | Kindness Church</title>

    <style>
        :root {
            --bg-color: #004F68;
            --primary-color: #CC0135;
            --text-color: #6E6E6E;
            --white: #ffffff;
        }

        body {
            background: #f7f9fb;
            color: var(--text-color);
        }

        .donation-hero {
            background: linear-gradient(rgba(0,79,104,0.85), rgba(0,79,104,0.85)),
                        url('{{ url_for("static", filename="images/church-building.jpg") }}');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 80px 20px;
            text-align: center;
        }

        .donation-card {
            border-radius: 20px;
            border: none;
        }

        .btn-donate {
            background-color: var(--primary-color);
            color: white;
            border-radius: 50px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-donate:hover {
            background-color: #a8002b;
            color: white;
        }

        .amount-btn {
            border-radius: 50px;
        }
    </style>
</head>
<body>

<!-- ================= HERO ================= -->

<section class="donation-hero">
    <h1 class="fw-bold">Support the Work of God</h1>
    <p class="mt-3">
        Your giving helps us build, grow, and impact lives.
    </p>
</section>

<!-- ================= DONATION FORM ================= -->

<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="card donation-card shadow-sm p-4">

                <h4 class="fw-bold mb-3 text-center">Make a Donation</h4>

                <!-- Quick Amount Buttons -->

                <div class="d-flex gap-2 mb-3 flex-wrap justify-content-center">
                    <button class="btn btn-outline-secondary amount-btn" onclick="setAmount(1000)">₦1,000</button>
                    <button class="btn btn-outline-secondary amount-btn" onclick="setAmount(5000)">₦5,000</button>
                    <button class="btn btn-outline-secondary amount-btn" onclick="setAmount(10000)">₦10,000</button>
                    <button class="btn btn-outline-secondary amount-btn" onclick="setAmount(20000)">₦20,000</button>
                </div>

                <!-- Form -->

                <form id="donationForm">

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Amount (₦)</label>
                        <input type="number" id="amount" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Purpose (Optional)</label>
                        <input type="text" id="purpose" class="form-control">
                    </div>

                    <button type="button" onclick="payWithPaystack()" class="btn btn-donate w-100">
                        Donate Now
                    </button>

                </form>

            </div>
        </div>
    </div>
</section>

<!-- ================= PAYSTACK ================= -->

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
    function setAmount(value) {
        document.getElementById('amount').value = value;
    }

    function payWithPaystack() {
        let name = document.getElementById('name').value;
        let email = document.getElementById('email').value;
        let amount = document.getElementById('amount').value;

        if (!name || !email || !amount) {
            alert("Please fill all required fields");
            return;
        }

        let handler = PaystackPop.setup({
            key: 'YOUR_PUBLIC_KEY_HERE',  // 🔥 Replace This
            email: email,
            amount: amount * 100,  // Paystack uses kobo
            currency: "NGN",

            metadata: {
                custom_fields: [
                    {
                        display_name: "Donor Name",
                        variable_name: "donor_name",
                        value: name
                    }
                ]
            },

            callback: function(response) {
                alert('Payment successful! Ref: ' + response.reference);

                // Optional → send to Flask backend
                window.location.href = "/verify-payment/" + response.reference;
            },

            onClose: function() {
                alert('Transaction cancelled');
            }
        });

        handler.openIframe();
    }
</script>

</body>
</html>
