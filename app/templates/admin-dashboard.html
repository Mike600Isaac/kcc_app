<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Kindness Church</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        body {
            font-family: 'Tinos', serif;
            background-color: #f8f9fa;
        }

        .sidebar {
            min-height: 100vh;
            background-color: #0d6efd;
            color: #fff;
        }

        .sidebar a {
            color: #fff;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #0b5ed7;
            border-radius: 6px;
        }

        .sidebar .nav-link.active {
            background-color: #6610f2;
            border-radius: 6px;
        }

        .content-area {
            padding: 2rem;
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }

        .gallery-card img, .gallery-card video, .gallery-card audio {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .ministry-tag {
            display: inline-block;
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: #fff;
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar p-3 flex-shrink-0">
        <h3 class="text-center mb-4">Admin Panel</h3>
        <ul class="nav flex-column">
            <li class="nav-item mb-2">
                <a class="nav-link active" href="#"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
            </li>
            <li class="nav-item mb-2">
                <a class="nav-link" href="#"><i class="fas fa-calendar-days me-2"></i> Events</a>
            </li>
            <li class="nav-item mb-2">
                <a class="nav-link" href="#"><i class="fas fa-image me-2"></i> Gallery</a>
            </li>
            <li class="nav-item mb-2">
                <a class="nav-link" href="#"><i class="fas fa-file-alt me-2"></i> Documents</a>
            </li>
            <li class="nav-item mb-2">
                <a class="nav-link" href="#"><i class="fas fa-users me-2"></i> Ministries</a>
            </li>
            <li class="nav-item mb-2">
                <a class="nav-link" href="#"><i class="fas fa-cogs me-2"></i> Settings</a>
            </li>
            <li class="nav-item mt-4">
                <a class="nav-link text-danger" href="#"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 content-area">

        <!-- Top Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white mb-4 shadow-sm rounded">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">Welcome, Admin</span>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNavbar" aria-controls="topNavbar" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="topNavbar">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="#"><i class="fas fa-bell"></i> Notifications</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#"><i class="fas fa-user-circle"></i> Profile</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Dashboard Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card p-3 card-hover">
                    <h5>Total Events</h5>
                    <h2>24</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 card-hover">
                    <h5>Gallery Items</h5>
                    <h2>128</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 card-hover">
                    <h5>Documents</h5>
                    <h2>35</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 card-hover">
                    <h5>Active Ministries</h5>
                    <h2>6</h2>
                </div>
            </div>
        </div>

        <!-- Add Gallery Form -->
        <div class="card p-4 shadow-sm mb-4">
            <h5>Add New Gallery Item</h5>
            <form>
                <div class="mb-3">
                    <label class="form-label">Gallery Type</label>
                    <select class="form-select">
                        <option selected disabled>Select Type</option>
                        <option>Photo</option>
                        <option>Video</option>
                        <option>Audio</option>
                        <option>Document</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Title / Caption</label>
                    <input type="text" class="form-control" placeholder="Enter title or caption">
                </div>

                <div class="mb-3">
                    <label class="form-label">Ministry (Optional)</label>
                    <select class="form-select">
                        <option selected disabled>Select Ministry</option>
                        <option>Children Ministry</option>
                        <option>Youth Ministry</option>
                        <option>Campus Ministry</option>
                        <option>Young Adult Ministry</option>
                        <option>Women Ministry</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Upload File(s)</label>
                    <input type="file" class="form-control" multiple>
                    <small class="text-muted">You can upload multiple files at once</small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description (Optional)</label>
                    <textarea class="form-control" rows="3" placeholder="Write additional details..."></textarea>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary rounded-3">Add to Gallery</button>
                </div>
            </form>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
